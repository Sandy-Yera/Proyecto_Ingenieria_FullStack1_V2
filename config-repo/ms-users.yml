server:
  port: 8083 #y así sucesivamente....

spring:
  datasource:
    # Usamos el nombre del servicio de red de MySQL y la DB del init.sql
    url: jdbc:mysql://logistica-mysql:3306/db_service_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: app_user
    password: "1234"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

