server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true # Evita conflictos si Eureka registra en mayúsculas o minúsculas

      # 🟠 SOLUCIÓN ALTO 3: Se remueve el filtro AddRequestHeader estático de YAML.
      # La inyección del X-Trace-Id dinámico se delega ahora a un GlobalFilter reactivo en Java.
      default-filters: []

      routes:
        - id: ms-auth
          uri: lb://ms-auth
          predicates:
            - Path=/api/auth/**

        - id: ms-users
          uri: lb://ms-users
          predicates:
            - Path=/api/users/**

        - id: ms-logs
          uri: lb://ms-logs
          predicates:
            - Path=/api/logs/**

        # Enrutamiento hacia Gestión de Edificios
        - id: ms-buildings
          uri: lb://ms-buildings
          predicates:
            - Path=/api/edificios/**

        - id: ms-quotes
          uri: lb://ms-quotes
          predicates:
            - Path=/api/cotizaciones/**

        - id: ms-security
          uri: lb://ms-security
          predicates:
            - Path=/api/roles/**,/api/role-assignments/**

        - id: ms-fleet
          uri: lb://ms-fleet
          predicates:
            - Path=/api/fleet/**

        - id: ms-staff
          uri: lb://ms-staff
          predicates:
            - Path=/api/v1/staff/**

        - id: ms-schedule
          uri: lb://ms-schedule
          predicates:
            - Path=/api/schedule/**

        - id: ms-inventory
          uri: lb://ms-inventory
          predicates:
            - Path=/api/inventory/**

        - id: ms-purchase
          uri: lb://ms-purchase
          predicates:
            - Path=/api/purchase/**

        - id: ms-price-engine
          uri: lb://ms-price-engine
          predicates:
            - Path=/api/precios/**

        - id: ms-workorders
          uri: lb://ms-workorders
          predicates:
            - Path=/api/workorders/**

        - id: ms-logistics
          uri: lb://ms-logistics
          predicates:
            - Path=/api/logistics/**

        - id: ms-billing
          uri: lb://ms-billing
          predicates:
            - Path=/api/billing/**

        - id: ms-payments
          uri: lb://ms-payments
          predicates:
            - Path=/api/payments/**

        - id: ms-notifications
          uri: lb://ms-notifications
          predicates:
            - Path=/api/notifications/**

# Monitoreo Actuator para verificación de mallas distribuidas
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true # Habilita la inspección de rutas activas vía /actuator/gateway/routes

# CORREGIDO: Eliminadas las trazas de Hibernate para evitar el colapso de Spring WebFlux
logging:
  level:
    root: INFO
    com.logistica: DEBUG # Permite ver el enrutamiento y filtros del Gateway
    org.springframework.cloud.gateway: DEBUG # Te dará visibilidad total de por dónde viajan las peticiones
