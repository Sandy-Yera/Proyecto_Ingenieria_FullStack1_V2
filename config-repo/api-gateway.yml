server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true # Evita conflictos si Eureka registra en mayúsculas o minúsculas

      # Filtro GLOBAL: Inyecta el Trace ID único para la auditoría asíncrona con ms-logs
      # ALERTA ARQUITECTÓNICA: Usar '${random.uuid}' aquí inyecta un ID estático generado al arrancar el Gateway.
      # Para sistemas distribuidos reales bajo Spring Cloud Gateway (WebFlux), se recomienda encarecidamente
      # implementar un 'GlobalFilter' en código Java (ms-gateway) que genere un UUID dinámico por cada 'ServerWebExchange',
      # o utilizar Spring Cloud Sleuth / Micrometer Tracing para propagar el "traceId" de forma nativa por HTTP y Kafka.
      default-filters:
        - AddRequestHeader=X-Trace-Id, ${random.uuid}

      routes:
        # 1. Núcleo de Autenticación y Credenciales
        - id: ms-auth
          uri: lb://ms-auth
          predicates:
            - Path=/api/auth/**

        # 2. Gestión de Perfiles de Usuarios
        - id: ms-users
          uri: lb://ms-users
          predicates:
            - Path=/api/users/**

        # 3. Tu Nuevo Microservicio: Motor de Seguridad y Permisos (RBAC)
        # NOTA: Descomentar únicamente cuando compiles e integres ms-security a la red
        #- id: ms-security
        #  uri: lb://ms-security
        #  predicates:
        #    - Path=/api/security/**

        # 4. Auditoría y Trazabilidad de Logs Centralizados
        - id: ms-logs
          uri: lb://ms-logs
          predicates:
            - Path=/api/logs/**

        # --- EXTENSIONES OPERATIVAS FUTURAS (Mapeadas según informe técnico) ---
        #- id: ms-logistics
        #  uri: lb://ms-logistics
        #  predicates:
        #    - Path=/api/logistics/**

        #- id: ms-workorders
        #  uri: lb://ms-workorders
        #  predicates:
        #    - Path=/api/workorders/**

# Configuración de Cliente Eureka (Acoplada a la red interna de Docker)
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    hostname: api-gateway

# Monitoreo Actuator para verificación de mallas distribuidas
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true # Habilita la inspección de rutas activas vía /actuator/gateway/routes
