services:
  mysql-db:
    image: mysql:8.0
    container_name: brm-mysql-nativo
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --max-connections=500
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - mysql_data_nativo:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - brm-infra
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: brm-zookeeper-nativo
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - brm-infra
    healthcheck:
      test: ["CMD", "bash", "-c", "timeout 1s bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/2181'"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: brm-kafka-nativo
    restart: unless-stopped
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: brm-zookeeper-nativo:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://brm-kafka-nativo:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms224m -Xmx224m"
    networks:
      - brm-infra
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "brm-kafka-nativo:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

networks:
  brm-infra:
    driver: bridge

volumes:
  mysql_data_nativo:
