services:
  mysql-db:
    image: mysql:8.0
    container_name: logistica-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --max-connections=500
    environment:
      - MYSQL_ROOT_PASSWORD=root
    # 2026: Ports eliminados por seguridad. Ningún agente externo puede acceder directo a la DB.
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 450M # Suficiente para consultas locales estructuradas
    networks:
      - brm-backend
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: brm-adminer
    restart: unless-stopped
    ports:
      - "8880:8080" # Expuesto al host para administración visual segura
    environment:
      - ADMINER_DEFAULT_SERVER=mysql-db
    deploy:
      resources:
        limits:
          memory: 64M # Contenedor PHP ultraligero
    networks:
      - brm-public
      - brm-backend
    depends_on:
      mysql-db:
        condition: service_healthy

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: brm-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data # Persistencia añadida para evitar pérdida de estado
    deploy:
      resources:
        limits:
          memory: 128M # Zookeeper requiere muy poca memoria en entornos single-node
    networks:
      - brm-backend
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "timeout 1s bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/2181'",
        ]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 5s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: brm-kafka
    restart: unless-stopped
    # Ports eliminados del host. Mensajería 100% interna aislada.
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: brm-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms224m -Xmx224m" # Limitamos el Heap de Kafka para liberar espacio al OS PageCache
    volumes:
      - kafka_data:/var/lib/kafka/data # Persistencia añadida para colas de mensajería
    deploy:
      resources:
        limits:
          memory: 600M # Balance dinámico entre heap y espacio de red interna
    networks:
      - brm-backend
    healthcheck:
      # CORRECCIÓN: El healthcheck ahora apunta al listener interno real de Docker (kafka:29092)
      test:
        ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  eureka-server:
    build: ../../infraestructure/eureka-server
    container_name: logistica-eureka
    restart: unless-stopped
    ports:
      - "8761:8761" # Expuesto para acceder al dashboard de control
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_COMPATIBILITY-VERIFIER_ENABLED=false
      - JAVA_OPTS=-Xms96m -Xmx160m # Reducido: Solo gestiona mapeos de nombres en memoria
    deploy:
      resources:
        limits:
          memory: 240M
    networks:
      - brm-public
      - brm-backend
    healthcheck:
      # CORRECCIÓN ALPINE: Se cambia curl por wget nativo de BusyBox
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8761/actuator/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build: ../../infraestructure/config-server
    container_name: brm-config-server
    restart: unless-stopped
    # Ports eliminados del host. Las credenciales centrales quedan protegidas dentro de la red interna.
    volumes:
      - ../../config-repo:/app/config-repo
    environment:
      - SPRING_PROFILES_ACTIVE=native,docker
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/app/config-repo/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://logistica-eureka:8761/eureka/
      - SPRING_CLOUD_COMPATIBILITY-VERIFIER_ENABLED=false
      - JAVA_OPTS=-Xms96m -Xmx160m # Reducido: Lee archivos planos locales, no requiere gran procesamiento
    deploy:
      resources:
        limits:
          memory: 240M
    depends_on:
      eureka-server:
        condition: service_healthy
    ports:
      - "8888:8888"
    networks:
      - brm-backend
      - brm-public
    healthcheck:
      # CORRECCIÓN ALPINE: Se cambia curl por wget nativo de BusyBox
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8888/actuator/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ../../infraestructure/api-gateway
    container_name: brm-api-gateway
    restart: unless-stopped
    ports:
      - "9090:8080" # ÚNICA puerta de entrada externa para el tráfico de la API
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
      - SPRING_CLOUD_COMPATIBILITY-VERIFIER_ENABLED=false
      - JAVA_OPTS=-Xms128m -Xmx224m # El gateway procesa reactivamente los flujos de entrada; requiere un poco más
    deploy:
      resources:
        limits:
          memory: 300M
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      # CORRECCIÓN ALPINE: Se cambia curl por wget nativo de BusyBox
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/actuator/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - brm-public
      - brm-backend

