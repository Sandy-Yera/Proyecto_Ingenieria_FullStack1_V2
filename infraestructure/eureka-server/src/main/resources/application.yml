server:
    port: 8761

spring:
    application:
        name: eureka-server

eureka:
    client:
        register-with-eureka: false
        fetch-registry: false

logging:
    level:
        com:
            netflix:
                eureka: INFO
                discovery: INFO

management:
    endpoints:
        web:
            exposure:
                include: health
    endpoint:
        health:
            show-details: always